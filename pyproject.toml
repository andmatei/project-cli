[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "project-cli"
version = "0.1.0"
description = "Personal-workspace CLI for managing project design docs, decisions, and code worktrees"
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.11"
authors = [{ name = "Andrei Matei" }]
keywords = ["cli", "workspace", "projects", "scaffolding", "git-worktree"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: MacOS",
    "Operating System :: POSIX :: Linux",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development",
    "Topic :: Utilities",
]
dependencies = [
    "typer>=0.25.0",
    "rich>=15.0.0",
    "pydantic>=2.6",
    "markdown-it-py>=3",
    "jinja2>=3.1.6",
    "tomlkit>=0.13",
    "questionary>=2",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-snapshot>=0.9",
]

[project.urls]
Homepage = "https://github.com/andmatei/project-cli"
Repository = "https://github.com/andmatei/project-cli"
Issues = "https://github.com/andmatei/project-cli/issues"
Changelog = "https://github.com/andmatei/project-cli/releases"

[project.scripts]
project-cli = "project_cli.app:app"

[tool.hatch.build.targets.wheel]
packages = ["src/project_cli"]
include = ["src/project_cli/_templates/*.j2"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
