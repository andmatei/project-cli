[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "keel-cli"
version = "0.1.0"
description = "CLI for the projects workspace"
requires-python = ">=3.11"
authors = [{ name = "Andrei Matei" }]
dependencies = [
    "typer>=0.12",
    "rich>=13",
    "pydantic>=2.6",
    "markdown-it-py>=3",
    "jinja2>=3.1",
    "tomlkit>=0.13",
    "questionary>=2",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-snapshot>=0.9",
    "ruff>=0.6",
]
# Plugin extras — each pulls a separately-developed, separately-published
# package on PyPI. `pip install keel-cli[jira]` is shorthand for installing
# keel-cli alongside the named plugin; entry-point discovery does the rest.
jira = ["keel-jira>=0.1"]
all = ["keel-jira>=0.1"]

[project.scripts]
keel = "keel.app:app"

[tool.hatch.build.targets.wheel]
packages = ["src/keel"]
include = ["src/keel/_templates/*.j2", "src/keel/lifecycles/defaults/*.toml"]

# Local development: resolve plugin extras against sibling source trees.
# When publishing to PyPI, this block is irrelevant — sources are only
# consulted for `uv` workflows in this repo.
[tool.uv.sources]
keel-jira = { path = "../keel-jira", editable = true }

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src", "tests"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "B",   # bugbear
    "UP",  # pyupgrade
    "SIM", # simplifications
]
ignore = [
    "E501",  # line too long (handled by formatter)
    "B008",  # function call in argument default (Typer requires this)
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["B"]  # tests can have less-strict bugbear

[tool.ruff.format]
quote-style = "double"
